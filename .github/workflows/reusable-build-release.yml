name: reusable-build-release

on:
  workflow_call:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string
      enable_packages:
        description: "Build .deb/.rpm packages (requires extra tooling)"
        required: false
        type: boolean
        default: false
      enable_android_apk:
        description: "Build Android APKs (requires android/ project)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Java (Android)
        if: ${{ inputs.enable_android_apk }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (Android)
        if: ${{ inputs.enable_android_apk }}
        uses: gradle/actions/setup-gradle@v4

      - name: Build artifacts
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          VERSION="${{ inputs.version }}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          DIST="dist"
          rm -rf "$DIST"
          mkdir -p "$DIST"

          cat > "$DIST/install-linux.sh" <<'SH'
          #!/usr/bin/env sh
          set -eu
          mode="${1:-inside}"
          bin="SUNLIONET-${mode}"
          src="./${bin}"
          dst="/usr/local/bin/${bin}"
          install -m 0755 "$src" "$dst"
          mkdir -p /etc/SUNLIONET
          if [ -f "./${bin}.service" ]; then
            install -m 0644 "./${bin}.service" "/etc/systemd/system/${bin}.service"
            systemctl daemon-reload || true
          fi
          printf "%s\n" "installed ${dst}"
          SH
          chmod +x "$DIST/install-linux.sh"

          cat > "$DIST/SUNLIONET-inside.service" <<'UNIT'
          [Unit]
          Description=SUNLIONET Agent (Inside)
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          EnvironmentFile=-/etc/SUNLIONET/inside.env
          ExecStart=/usr/local/bin/SUNLIONET-inside
          Restart=always
          RestartSec=2

          [Install]
          WantedBy=multi-user.target
          UNIT

          cat > "$DIST/SUNLIONET-outside.service" <<'UNIT'
          [Unit]
          Description=SUNLIONET Agent (Outside)
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          EnvironmentFile=-/etc/SUNLIONET/outside.env
          ExecStart=/usr/local/bin/SUNLIONET-outside
          Restart=always
          RestartSec=2

          [Install]
          WantedBy=multi-user.target
          UNIT

          build_bin() {
            local mode="$1"
            local tags="$2"
            local goos="$3"
            local goarch="$4"
            local out="$5"
            local pkg="./cmd/${mode}"

            env GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -tags "$tags" -ldflags "$LDFLAGS" -o "$out" "$pkg"
          }

          package_targz() {
            local base="$1"
            local work="$2"
            tar -czf "${DIST}/${base}.tar.gz" -C "$work" .
          }

          package_zip() {
            local base="$1"
            local work="$2"
            (cd "$work" && zip -qr "../../${DIST}/${base}.zip" .)
          }

          build_bundle() {
            local mode="$1"
            local tags="$2"
            local goos="$3"
            local goarch="$4"
            local format="$5"

            local base="SUNLIONET-${mode}-${VERSION}-${goos}-${goarch}"
            local work
            work="$(mktemp -d)"

            local bin="SUNLIONET-${mode}"
            if [ "$goos" = "windows" ]; then
              bin="${bin}.exe"
            fi

            build_bin "$mode" "$tags" "$goos" "$goarch" "${work}/${bin}"

            cp -f "${DIST}/install-linux.sh" "${work}/install-linux.sh"
            if [ "$mode" = "inside" ]; then
              cp -f "${DIST}/SUNLIONET-inside.service" "${work}/SUNLIONET-inside.service"
            fi
            if [ "$mode" = "outside" ]; then
              cp -f "${DIST}/SUNLIONET-outside.service" "${work}/SUNLIONET-outside.service"
            fi

            if [ "$format" = "targz" ]; then
              package_targz "$base" "$work"
            else
              package_zip "$base" "$work"
            fi

            rm -rf "$work"
          }

          build_raw() {
            local mode="$1"
            local tags="$2"
            local goos="$3"
            local goarch="$4"
            local out="${DIST}/SUNLIONET-${mode}-${VERSION}-${goos}-${goarch}"
            build_bin "$mode" "$tags" "$goos" "$goarch" "$out"
          }

          build_raw_named() {
            local mode="$1"
            local tags="$2"
            local goos="$3"
            local goarch="$4"
            local out="${DIST}/SUNLIONET-${mode}"
            build_bin "$mode" "$tags" "$goos" "$goarch" "$out"
          }

          build_bundle inside inside linux amd64 targz
          build_bundle inside inside linux arm64 targz
          build_bundle inside inside darwin arm64 targz
          build_bundle inside inside windows amd64 zip
          build_raw inside inside android arm64

          build_bundle outside outside linux amd64 targz
          build_bundle outside outside linux arm64 targz
          build_bundle outside outside darwin arm64 targz
          build_bundle outside outside windows amd64 zip

          # Linux baseline binaries and combined tarball for quick installs.
          build_raw_named inside inside linux amd64
          build_raw_named outside outside linux amd64
          work_linux="$(mktemp -d)"
          cp -f "${DIST}/SUNLIONET-inside" "${work_linux}/SUNLIONET-inside"
          cp -f "${DIST}/SUNLIONET-outside" "${work_linux}/SUNLIONET-outside"
          cp -f "${DIST}/install-linux.sh" "${work_linux}/install-linux.sh"
          cp -f "${DIST}/SUNLIONET-inside.service" "${work_linux}/SUNLIONET-inside.service"
          cp -f "${DIST}/SUNLIONET-outside.service" "${work_linux}/SUNLIONET-outside.service"
          tar -czf "${DIST}/SUNLIONET-linux-amd64.tar.gz" -C "${work_linux}" .
          rm -rf "${work_linux}"

          cp -f "${DIST}/SUNLIONET-inside-${VERSION}-linux-arm64" "${DIST}/SUNLIONET-inside-${VERSION}-raspberrypi-arm64"

          git archive --format=tar.gz -o "${DIST}/SUNLIONET-agent-${VERSION}-source.tar.gz" HEAD

          if [ "${{ inputs.enable_packages }}" = "true" ]; then
            DEB_VERSION="${VERSION#v}"
            deb_root="$(mktemp -d)"
            mkdir -p "${deb_root}/DEBIAN" "${deb_root}/usr/local/bin" "${deb_root}/etc/systemd/system"
            cp -f "${DIST}/SUNLIONET-inside" "${deb_root}/usr/local/bin/SUNLIONET-inside"
            cp -f "${DIST}/SUNLIONET-outside" "${deb_root}/usr/local/bin/SUNLIONET-outside"
            cp -f "${DIST}/SUNLIONET-inside.service" "${deb_root}/etc/systemd/system/SUNLIONET-inside.service"
            cp -f "${DIST}/SUNLIONET-outside.service" "${deb_root}/etc/systemd/system/SUNLIONET-outside.service"
            chmod 0755 "${deb_root}/usr/local/bin/SUNLIONET-inside" "${deb_root}/usr/local/bin/SUNLIONET-outside"
            chmod 0644 "${deb_root}/etc/systemd/system/SUNLIONET-inside.service" "${deb_root}/etc/systemd/system/SUNLIONET-outside.service"

            cat > "${deb_root}/DEBIAN/control" <<CONTROL
Package: SUNLIONET
Version: ${DEB_VERSION}
Architecture: amd64
Maintainer: SUNLIONET
Description: SUNLIONET agent
CONTROL

            cat > "${deb_root}/DEBIAN/postinst" <<'POSTINST'
#!/bin/sh
set -e
if command -v systemctl >/dev/null 2>&1; then
  systemctl daemon-reload || true
fi
POSTINST

            cat > "${deb_root}/DEBIAN/postrm" <<'POSTRM'
#!/bin/sh
set -e
if command -v systemctl >/dev/null 2>&1; then
  systemctl daemon-reload || true
fi
POSTRM
            chmod 0755 "${deb_root}/DEBIAN/postinst" "${deb_root}/DEBIAN/postrm"

            dpkg-deb --build "${deb_root}" "${DIST}/SUNLIONET_${DEB_VERSION}_amd64.deb"

            if command -v fpm >/dev/null 2>&1; then
              fpm -s dir -t rpm -n SUNLIONET -v "${DEB_VERSION}" -a x86_64 \
                --description "SUNLIONET agent" --maintainer "SUNLIONET" \
                -C "${deb_root}" usr/local/bin/SUNLIONET-inside usr/local/bin/SUNLIONET-outside \
                etc/systemd/system/SUNLIONET-inside.service etc/systemd/system/SUNLIONET-outside.service \
                -p "${DIST}/SUNLIONET-${DEB_VERSION}.x86_64.rpm"
            else
              echo "fpm not available; skipping optional rpm build."
            fi
            rm -rf "${deb_root}"
          fi

          if [ "${{ inputs.enable_android_apk }}" = "true" ]; then
            if [ -z "${ANDROID_RELEASE_KEYSTORE_B64:-}" ] || [ -z "${ANDROID_RELEASE_KEYSTORE_PASSWORD:-}" ] || [ -z "${ANDROID_RELEASE_KEY_ALIAS:-}" ] || [ -z "${ANDROID_RELEASE_KEY_PASSWORD:-}" ]; then
              echo "Missing Android signing secrets. Expected ANDROID_RELEASE_KEYSTORE_B64 / ANDROID_RELEASE_KEYSTORE_PASSWORD / ANDROID_RELEASE_KEY_ALIAS / ANDROID_RELEASE_KEY_PASSWORD."
              exit 1
            fi
            keystore_path="${RUNNER_TEMP}/android-release.keystore"
            echo "${ANDROID_RELEASE_KEYSTORE_B64}" | base64 -d > "${keystore_path}"
            export RELEASE_KEYSTORE="${keystore_path}"
            export RELEASE_KEYSTORE_PASSWORD="${ANDROID_RELEASE_KEYSTORE_PASSWORD}"
            export RELEASE_KEY_ALIAS="${ANDROID_RELEASE_KEY_ALIAS}"
            export RELEASE_KEY_PASSWORD="${ANDROID_RELEASE_KEY_PASSWORD}"

            if [ -x "./android/gradlew" ]; then
              (cd android && ./gradlew --no-daemon assembleRelease)
            else
              (cd android && gradle --no-daemon assembleRelease)
            fi

            cp -f "android/app/build/outputs/apk/release/app-release.apk" "${DIST}/app-release.apk"
            cp -f "android/app/build/outputs/apk/release/app-release.apk" "${DIST}/SUNLIONET-android-${VERSION}-app-release.apk"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: SUNLIONET-release-${{ inputs.version }}
          path: dist/*
