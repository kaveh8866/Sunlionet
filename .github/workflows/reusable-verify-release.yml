name: reusable-verify-release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: Run tests
        run: go test ./...

      - uses: actions/download-artifact@v4
        with:
          name: shadownet-release-${{ inputs.version }}
          path: dist

      - name: Compute checksums + release manifest
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          cd dist

          rm -f checksums.txt checksums.sig checksums.pem checksums.pub checksums.pub.sha256 release.json
          touch checksums.txt

          files="$(ls -1 | grep -vE '^(checksums\.txt|checksums\.(sig|pem|pub)|checksums\.pub\.sha256|release\.json|.*\.(sha256|sha512))$' || true)"
          if [ -z "$files" ]; then
            echo "no artifacts found in dist/"
            exit 1
          fi

          for f in $files; do
            sha256sum "$f" > "${f}.sha256"
            cat "${f}.sha256" >> checksums.txt
          done

          python3 - <<'PY'
          import glob, json, os
          version = os.environ["VERSION"]
          checksums = {}
          with open("checksums.txt", "r", encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  parts = line.split()
                  if len(parts) >= 2:
                      checksums[parts[-1]] = parts[0]
          artifacts = []
          for path in sorted([p for p in glob.glob("*") if os.path.isfile(p)]):
            if path.endswith((".sha256", ".sha512", ".sig", ".pem")):
              continue
            if path in ("checksums.txt", "checksums.sig", "checksums.pem", "checksums.pub", "checksums.pub.sha256", "release.json"):
              continue
            sha256 = checksums.get(path)
            artifacts.append(
              {
                "name": path,
                "sha256": sha256,
                "size": os.path.getsize(path),
              }
            )
          manifest = {
            "schema": "shadownet.release-manifest.v1",
            "version": version,
            "artifacts": artifacts,
            "verification": {
              "checksums": "checksums.txt",
              "signature": "checksums.sig",
              "public_key": "checksums.pub",
              "public_key_fingerprint": "checksums.pub.sha256"
            }
          }
          with open("release.json", "w", encoding="utf-8") as f:
            json.dump(manifest, f, ensure_ascii=False, indent=2)
            f.write("\n")
          PY
        env:
          VERSION: ${{ inputs.version }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksum bundle
        shell: bash
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -euo pipefail
          cd dist
          if [ -z "${COSIGN_PRIVATE_KEY:-}" ] || [ -z "${COSIGN_PUBLIC_KEY:-}" ]; then
            echo "Missing cosign keys. Expected COSIGN_PRIVATE_KEY and COSIGN_PUBLIC_KEY secrets."
            exit 1
          fi
          printf "%s" "${COSIGN_PRIVATE_KEY}" > cosign.key
          printf "%s" "${COSIGN_PUBLIC_KEY}" > checksums.pub
          chmod 0600 cosign.key
          cosign sign-blob --yes --key cosign.key --output-signature checksums.sig checksums.txt
          sha256sum checksums.pub > checksums.pub.sha256
          rm -f cosign.key

      - name: Verify signatures
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          cosign verify-blob --key checksums.pub --signature checksums.sig checksums.txt >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: shadownet-release-verified-${{ inputs.version }}
          path: dist/*
