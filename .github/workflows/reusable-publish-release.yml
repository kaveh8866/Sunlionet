name: reusable-publish-release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: SUNLIONET-release-verified-${{ inputs.version }}
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
          files: |
            dist/*

      - name: Notify Telegram Mirror
        if: success()
        shell: bash
        run: |
          echo "Simulating Telegram mirror update for version ${{ inputs.version }}"
          # In a real environment, this would call a bot API or use a dedicated action:
          # curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          #   -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=New SunLionet Release: ${{ inputs.version }} - https://github.com/SunLionet/Iran-Agent-Vpn/releases/tag/${{ inputs.version }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
