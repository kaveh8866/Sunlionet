name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_heavy_tests:
        description: "Run simulation/performance stress tests"
        required: false
        type: boolean
        default: false

jobs:
  go-test:
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        go-version: ['1.25.x', '1.26.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: go version
        run: go version
      - name: go mod tidy
        if: runner.os == 'Linux' && matrix.go-version == '1.25.x'
        run: go mod tidy
      - name: Verify tidy is clean
        if: runner.os == 'Linux' && matrix.go-version == '1.25.x'
        shell: bash
        run: git diff --exit-code go.mod go.sum
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...
      - name: chaos tests
        if: runner.os == 'Linux'
        run: go test ./tests/chaos -count=1 -v
      - name: chaos race tests
        if: runner.os == 'Linux'
        run: go test -race ./tests/chaos -count=1 -v
      - name: go test (outside tag)
        run: go test -tags outside ./...
      - name: go vet
        run: go vet ./...
      - name: go vet (outside tag)
        run: go vet -tags outside ./...
      - name: gofmt check
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "gofmt needed on:"
            echo "$files"
            exit 1
          fi
      - name: build cmd/inside
        run: go build -tags inside ./cmd/inside
      - name: build cmd/outside
        run: go build -tags outside ./cmd/outside
      - name: outside flow smoke tests
        run: go test ./tests/integration -run TestOutside -count=1 -v
      - name: linux mvp smoke test
        if: runner.os == 'Linux'
        run: go test ./tests/integration -run TestInsideLinuxMVP -count=1 -v

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_COMMENTS: "false"

  website:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: website/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Set website build metadata
        shell: bash
        run: |
          echo "NEXT_PUBLIC_REPO_URL=https://github.com/${GITHUB_REPOSITORY}" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_GIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_GIT_AUTHOR=$(git log -1 --pretty=format:%an)" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_GIT_COMMIT_TIMESTAMP=$(git log -1 --pretty=format:%cI)" >> "$GITHUB_ENV"
      - name: Build website
        run: npm run build

  heavy-sim-perf:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_heavy_tests }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go version
        run: go version
      - name: validate go version
        shell: bash
        run: |
          goversion="$(go env GOVERSION)"
          echo "Detected: ${goversion}"
      - name: Run censorship matrix
        run: go test ./tests/simulation -run TestCensorshipSimulationScenarioMatrix_64Scenarios -count=1
      - name: Run latency and stability gates
        run: go test -tags perf ./tests/performance -run "TestDecisionLatencyP95_Under5s|TestRotationStability_1000Switches_NoPanic" -count=1
      - name: Run chaos reconnect storm
        run: go test ./tests/chaos -run TestChaosMemoryStableAcrossReconnectStorm -count=1 -v

  android-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Android lint
        run: cd android && ./gradlew lintDebug
      - name: Android unit tests
        run: cd android && ./gradlew testDebugUnitTest
